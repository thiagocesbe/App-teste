<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Contas PRO</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0a0a0b;
color:#fff;
font-size:13px;
}

header{
padding:14px 12px 6px;
font-size:18px;
font-weight:600;
}

.container{padding:10px}

.card{
background:#151517;
border-radius:16px;
padding:12px;
margin-bottom:12px;
}

.section{
margin-top:8px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
font-size:12px;
opacity:.7;
margin-bottom:6px;
}

.add-btn{
font-size:18px;
cursor:pointer;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 6px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.item:last-child{
border-bottom:none;
}

.left{
display:flex;
flex-direction:column;
}

.name{
font-size:13px;
font-weight:500;
}

.due{
font-size:10px;
opacity:.5;
margin-top:2px;
}

.value{
font-size:14px;
font-weight:600;
}

.total{
margin-top:6px;
font-size:12px;
opacity:.6;
}

input,button{
width:100%;
margin:4px 0;
padding:7px;
border-radius:10px;
border:none;
background:#1e1e21;
color:#fff;
font-size:12px;
}

button{
background:#fff;
color:#000;
font-weight:600;
}

.delete-text{
color:#ff4d4d;
font-size:10px;
margin-top:4px;
}

textarea{
width:100%;
background:transparent;
border:none;
color:#fff;
min-height:80px;
}
</style>
</head>

<body>

<header contenteditable id="title">Meu Controle</header>

<div class="container">

<div class="card">
<div class="section-header" onclick="toggleAccountForm()">
<span>Nova Conta</span>
<span id="toggleIcon">+</span>
</div>

<div id="accountForm" style="display:none">
<input id="accountName" placeholder="Nome da conta">
<input id="accountColor" type="color">
<button onclick="addAccount()">Adicionar</button>
</div>
</div>

<div id="accounts"></div>

<div class="card" id="grandTotal"></div>

<div class="card">
<div class="section-header" onclick="toggleNotes()">
<span>Anotações</span>
<span id="notesToggle">▼</span>
</div>

<div id="notesArea" style="display:none">
<textarea id="notesInput"></textarea>
</div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem('financeAppPRO')) || [];

function save(){
localStorage.setItem('financeAppPRO',JSON.stringify(data));
}

function brl(v){
return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function toggleAccountForm(){
let f=document.getElementById('accountForm');
f.style.display=f.style.display==='none'?'block':'none';
}

function addAccount(){
let name=document.getElementById('accountName').value;
let color=document.getElementById('accountColor').value;

if(!name) return;

data.push({
name,color,
sections:[
{name:'Contas Recorrentes',items:[]},
{name:'Contas Parceladas',items:[]},
{name:'Gastos Diversos',items:[]}
]
});

document.getElementById('accountName').value='';
save();
render();
}

function render(){
let el=document.getElementById('accounts');
el.innerHTML='';
let total=0;

data.forEach((acc,ai)=>{
let card=document.createElement('div');
card.className='card';

card.innerHTML=`<div style="color:${acc.color};font-weight:600;margin-bottom:6px">${acc.name}</div>`;

acc.sections.forEach((sec,si)=>{
let secDiv=document.createElement('div');
secDiv.className='section';

secDiv.innerHTML=`
<div class="section-header">
<span>${sec.name}</span>
<span class="add-btn">+</span>
</div>
`;

sec.items.forEach((it)=>{
total+=it.value;

secDiv.innerHTML+=`
<div class="item">
<div class="left">
<span class="name">${it.name}</span>
${it.due?`<span class="due">dia ${it.due}</span>`:''}
</div>
<span class="value">${brl(it.value)}</span>
</div>
`;
});

card.appendChild(secDiv);
});

el.appendChild(card);
});

document.getElementById('grandTotal').innerText="Total: "+brl(total);
}

render();
</script>

</body>
</html>
